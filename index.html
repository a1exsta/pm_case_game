<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PM Case Game</title>
  <meta name="description" content="Интерактивная тренинговая кейс-игра для PM: 5 сценариев, решения, фидбек и профиль менеджера." />
  <meta property="og:title" content="PM Case Game" />
  <meta property="og:description" content="5 сценариев, 20 минут, 15 очков. Пройди полный цикл запуска B2B-продукта." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://dummyimage.com/1200x630/0d0d0f/7c6df0&text=PM+Case+Game" />
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"%3E%3Crect width="64" height="64" rx="12" fill="%230d0d0f"/%3E%3Ctext x="50%25" y="56%25" text-anchor="middle" font-size="30" fill="%237c6df0" font-family="Arial"%3EPM%3C/text%3E%3C/svg%3E' />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=Unbounded:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #141417;
      --surface-2: #1a1a1f;
      --text: #f1f3f7;
      --muted: #9ba3b5;
      --accent: #7c6df0;
      --ok: #10b981;
      --warn: #f59e0b;
      --bad: #ef4444;
      --danger: #dc2626;
      --cyan: #22d3ee;
      --pink: #e879f9;
    }
    body[data-theme="light"] {
      --bg: #eef2ff;
      --surface: #ffffff;
      --surface-2: #f4f6ff;
      --text: #141b32;
      --muted: #596385;
      --accent: #635bff;
      --ok: #059669;
      --warn: #d97706;
      --bad: #dc2626;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(124,109,240,.25), transparent 50%),
        radial-gradient(900px 500px at 100% 0%, rgba(34,211,238,.18), transparent 45%),
        var(--bg);
      color: var(--text);
      font-family: Manrope, system-ui, sans-serif;
      overflow-x: hidden;
    }
    .bg-orb {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 50%;
      filter: blur(44px);
      opacity: .22;
      pointer-events: none;
      z-index: 0;
      animation: orbMove 14s ease-in-out infinite alternate;
    }
    .orb-1 {
      left: -140px;
      top: -110px;
      background: radial-gradient(circle at 40% 40%, #7c6df0, transparent 70%);
    }
    .orb-2 {
      right: -120px;
      top: 60px;
      background: radial-gradient(circle at 40% 40%, #22d3ee, transparent 70%);
      animation-duration: 18s;
    }
    .bg-grid {
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.04) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.04) 1px, transparent 1px);
      background-size: 36px 36px;
      mask-image: radial-gradient(circle at 50% 20%, black 20%, transparent 75%);
      opacity: .25;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes orbMove {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 24px) scale(1.12); }
    }
    .app { min-height: 100vh; display: flex; justify-content: center; padding: 20px; }
    .card {
      width: 100%;
      max-width: 920px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0)),
        linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid rgba(124,109,240,.24);
      border-radius: 16px;
      padding: 20px;
      box-shadow:
        0 16px 48px rgba(0,0,0,.45),
        inset 0 1px 0 rgba(255,255,255,.04);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 1;
    }
    .card.enter { animation: fadeSlide .42s cubic-bezier(.2,.8,.2,1); }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px) scale(.995); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    h1, h2, h3 { font-family: Unbounded, sans-serif; line-height: 1.2; margin: 0 0 12px; }
    p { color: var(--text); margin: 0 0 10px; }
    .muted { color: var(--muted); }
    .top {
      display: flex; justify-content: space-between; align-items: center; gap: 12px;
      margin-bottom: 18px; flex-wrap: wrap;
    }
    .theme-btn {
      background: linear-gradient(90deg, #2a2f47, #1f2438);
      color: var(--text);
      border: 1px solid #424a70;
      min-height: 38px;
      min-width: 38px;
      border-radius: 10px;
      cursor: pointer;
      font: inherit;
      padding: 0 10px;
    }
    .score {
      background: rgba(124,109,240,.15);
      color: #c9c3ff;
      border: 1px solid rgba(124,109,240,.45);
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
    }
    .dots { display: flex; gap: 8px; align-items: center; }
    .dot {
      width: 12px; height: 12px; border-radius: 999px; border: 1px solid #404050; background: #22232b;
    }
    .dot.done { background: #2ebf98; border-color: #2ebf98; }
    .dot.active { background: var(--accent); border-color: var(--accent); animation: pulseDot 1.2s ease-in-out infinite; }
    @keyframes pulseDot {
      0%,100% { box-shadow: 0 0 0 0 rgba(124,109,240,.35); transform: scale(1); }
      50% { box-shadow: 0 0 0 8px rgba(124,109,240,0); transform: scale(1.2); }
    }
    .timeline-labels { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-block;
      background: linear-gradient(90deg, rgba(124,109,240,.28), rgba(232,121,249,.20));
      color: #ede9ff;
      border: 1px solid rgba(182,167,255,.52);
      font-size: 12px;
      border-radius: 999px;
      padding: 5px 10px;
      margin-bottom: 14px;
    }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 14px 0 20px; }
    .stat { background: #12131a; border: 1px solid #2a2b35; border-radius: 12px; padding: 12px; text-align: center; }
    .stat b { font-family: Unbounded, sans-serif; display: block; margin-bottom: 4px; font-size: 16px; }
    .roles { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 14px 0 18px; }
    .role-btn, .choice, .btn {
      background: linear-gradient(180deg, #1d1f2a, #191b25); color: var(--text); border: 1px solid #313342; border-radius: 12px;
      padding: 12px; cursor: pointer; text-align: left; font: inherit;
      transition: .18s ease;
    }
    .role-btn:hover, .choice:hover {
      transform: translateY(-2px) scale(1.01);
      border-color: #6e74a8;
      box-shadow: 0 10px 26px rgba(35,40,78,.35);
    }
    .role-btn.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,109,240,.25) inset, 0 8px 22px rgba(124,109,240,.22); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; text-align: center;
      min-height: 42px; min-width: 160px; background: linear-gradient(90deg, #7c6df0, #9a8cff); border-color: transparent; font-weight: 700;
      box-shadow: 0 10px 24px rgba(124,109,240,.28);
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.08); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }
    .choice-list { display: grid; gap: 10px; margin: 12px 0; }
    .choice.locked { cursor: default; opacity: .8; }
    .stakeholders { display: grid; gap: 8px; margin: 12px 0; }
    .bubble {
      background: #12131a; border: 1px solid #2c2e3d; border-radius: 12px; padding: 10px;
      display: grid; grid-template-columns: 38px 1fr; gap: 10px; align-items: start;
    }
    .bubble b { color: #d5d9e9; }
    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.22);
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(0,0,0,.28);
      background: #1a2237;
    }
    .avatar svg { width: 100%; height: 100%; display: block; }
    .feedback { margin-top: 14px; padding: 12px; border-radius: 12px; border: 1px solid transparent; }
    .feedback.good { background: rgba(16,185,129,.10); border-color: rgba(16,185,129,.35); }
    .feedback.ok { background: rgba(245,158,11,.10); border-color: rgba(245,158,11,.35); }
    .feedback.bad { background: rgba(239,68,68,.10); border-color: rgba(239,68,68,.35); }
    .feedback.danger { background: rgba(220,38,38,.13); border-color: rgba(220,38,38,.38); }
    .hero {
      border: 1px solid rgba(120,125,168,.35);
      border-radius: 14px;
      padding: 14px;
      margin: 10px 0 14px;
      background: linear-gradient(120deg, rgba(124,109,240,.18), rgba(34,211,238,.10));
    }
    .scenario-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 12px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(93,108,158,.45);
      background: linear-gradient(90deg, rgba(31,37,62,.65), rgba(20,31,55,.45));
    }
    .scenario-icon {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 18px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(124,109,240,.24);
    }
    .scenario-meta b { display: block; margin-bottom: 2px; }
    .focus-chip {
      display: inline-block;
      margin-right: 8px;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(94,111,170,.55);
      background: rgba(24,31,52,.75);
      color: #cad6ff;
      font-size: 12px;
      animation: floatChip 4.5s ease-in-out infinite;
    }
    .focus-chip:nth-child(2n) { animation-delay: .3s; }
    .focus-chip:nth-child(3n) { animation-delay: .6s; }
    @keyframes floatChip {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .scene-art {
      margin: 10px 0 12px;
      border: 1px solid rgba(95,106,147,.45);
      border-radius: 14px;
      overflow: hidden;
      background: #0e1118;
    }
    .scene-art svg { width: 100%; height: 190px; display: block; }
    .scene-art { animation: artIn .5s ease; }
    @keyframes artIn {
      from { opacity: 0; transform: translateY(8px) scale(.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .ring-wrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .ring {
      width: 120px; height: 120px; border-radius: 50%;
      background: conic-gradient(var(--accent) calc(var(--p) * 1%), #2a2b35 0);
      display: grid; place-items: center;
    }
    .ring > div {
      width: 84px; height: 84px; border-radius: 50%; background: var(--surface);
      display: grid; place-items: center; font-family: Unbounded, sans-serif; font-size: 20px;
    }
    .log { display: grid; gap: 10px; margin-top: 14px; }
    .log-item { border: 1px solid #2c2f3e; background: #12131a; border-radius: 10px; padding: 10px; }
    .growth { margin-top: 14px; padding: 12px; border: 1px solid #303245; border-radius: 12px; background: #101119; }
    .growth h3 { margin-bottom: 8px; }
    .growth-item { margin-bottom: 8px; }
    .skills-box { margin-top: 14px; padding: 12px; border: 1px solid #2f3b48; border-radius: 12px; background: #0f141c; }
    .skills-box h3 { margin-bottom: 8px; }
    .skills-item { margin-bottom: 8px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; border: 1px solid; margin-left: 8px; }
    .pill.good { color: #9cf3cf; border-color: #2f946f; }
    .pill.ok { color: #f8d395; border-color: #ac7d2b; }
    .pill.bad, .pill.danger { color: #ffb1b1; border-color: #b43d3d; }
    .coach-modal {
      position: fixed; inset: 0; background: rgba(7,7,11,.82); display: none; align-items: center; justify-content: center; padding: 16px; z-index: 99;
    }
    .coach-modal.open { display: flex; }
    .coach-panel {
      width: 100%; max-width: 900px; max-height: 88vh; overflow: auto;
      background: #111218; border: 1px solid #2f3244; border-radius: 14px; padding: 14px;
    }
    .coach-head { display:flex; justify-content: space-between; align-items: center; gap: 10px; }
    .x-btn {
      background: #232534; color: var(--text); border: 1px solid #3a3e56; border-radius: 10px; min-width: 38px; min-height: 38px; cursor: pointer;
    }
    .coach-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
    .provider-row { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .provider-btn {
      background: #1a1d2a; color: var(--text); border: 1px solid #353a53; border-radius: 999px; padding: 8px 12px; cursor: pointer; font: inherit;
    }
    .provider-btn.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(124,109,240,.24) inset; }
    .field { display: grid; gap: 6px; }
    .field label { color: var(--muted); font-size: 12px; }
    .input, .chat-input {
      background: #0d0f16; color: var(--text); border: 1px solid #32364d; border-radius: 10px; padding: 10px; width: 100%; font: inherit;
    }
    .chat-log { border: 1px solid #2e3248; border-radius: 12px; background: #0e111a; padding: 10px; min-height: 220px; max-height: 320px; overflow: auto; }
    .msg { margin-bottom: 10px; padding: 10px; border-radius: 10px; border: 1px solid; white-space: pre-wrap; }
    .msg.user { background: #192036; border-color: #33456e; }
    .msg.assistant { background: #13211e; border-color: #2f5e53; }
    .msg.system { background: #201521; border-color: #5a3a61; }
    .chat-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 10px; }
    @media (max-width: 760px) {
      .grid, .roles { grid-template-columns: 1fr; }
      .coach-settings { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-grid"></div>
  <div class="app">
    <main class="card" id="app"></main>
  </div>
  <div class="coach-modal" id="coachModal">
    <div class="coach-panel">
      <div class="coach-head">
        <h3 style="margin:0;">AI-тренер: разбор кейса</h3>
        <button class="x-btn" id="coachCloseBtn" aria-label="Закрыть">✕</button>
      </div>
      <p class="muted">Отправьте вопрос по вашему прохождению. Тренер получает контекст выбранных решений.</p>
      <div class="provider-row">
        <button class="provider-btn" type="button" data-provider="openai">OpenAI</button>
        <button class="provider-btn" type="button" data-provider="deepseek">DeepSeek</button>
        <button class="provider-btn" type="button" data-provider="openrouter">OpenRouter</button>
        <button class="provider-btn" type="button" data-provider="anthropic">Claude (Anthropic)</button>
      </div>
      <div class="coach-settings">
        <div class="field">
          <label for="coachEndpoint">API endpoint (OpenAI-compatible)</label>
          <input id="coachEndpoint" class="input" placeholder="https://api.openai.com/v1/chat/completions" />
        </div>
        <div class="field">
          <label for="coachModel">Model</label>
          <input id="coachModel" class="input" placeholder="gpt-4o-mini" />
        </div>
      </div>
      <div class="field">
        <label for="coachApiKey">API key (сохраняется только в localStorage браузера)</label>
        <input id="coachApiKey" class="input" type="password" placeholder="sk-..." />
      </div>
      <div class="chat-log" id="coachLog"></div>
      <div class="chat-row">
        <input id="coachInput" class="chat-input" placeholder="Например: где у меня главный риск как PM?" />
        <button class="btn" id="coachSendBtn">Отправить</button>
      </div>
    </div>
  </div>

  <script>
    const scenarios = [
      {
        title: "Приоритизация скоупа (Неделя 1)",
        competency: "Приоритизация и alignment",
        context: "Три стейкхолдера требуют разного: CEO хочет запуск через 3 месяца, CTO говорит о рисках качества, Sales требует интеграцию 1С для первых клиентов.",
        stakeholders: [
          { name: "CEO", text: "Выйти в рынок как можно раньше, даже с урезанным MVP." },
          { name: "CTO", text: "3 месяца нереалистично без роста техдолга." },
          { name: "Sales", text: "Без 1С текущие клиенты не подпишут контракт." }
        ],
        question: "Как вы договоритесь о скоупе прямо сейчас?",
        choices: [
          { key: "А", text: "Поддержать CEO: запуск через 3 месяца с минимальным MVP.", type: "bad", pts: 1, feedback: "Быстрый выход без валидации ценности и без учёта рисков качества повышает шанс провала." },
          { key: "Б", text: "Провести MoSCoW-воркшоп со всеми стейкхолдерами и зафиксировать скоуп.", type: "good", pts: 3, feedback: "Выравнивание ожиданий на старте снижает конфликты и повышает предсказуемость." },
          { key: "В", text: "Провести быстрый custdev (5-7 интервью) и вернуть data-driven скоуп.", type: "good", pts: 3, feedback: "Решение на основе данных снижает риск построить не то, хотя требует времени." },
          { key: "Г", text: "Взять скоуп Sales, так как есть 3 платящих клиента.", type: "ok", pts: 2, feedback: "Живые деньги важны, но выборка мала для масштабируемого продуктового решения." }
        ]
      },
      {
        title: "Кризис команды (Неделя 6)",
        competency: "Кризисная коммуникация",
        context: "Ведущий разработчик уходит через 2 недели. Он держит ключевые знания по архитектуре. До дедлайна 10 недель.",
        stakeholders: [
          { name: "Команда", text: "Деморализована, не понимает, как закрыть критические фичи." },
          { name: "PM", text: "Нужно действовать в первые 48 часов и управлять рисками открыто." }
        ],
        question: "Что вы сделаете в первые 48 часов?",
        choices: [
          { key: "А", text: "Срочно нанять дорогого подрядчика и закрыть пробел.", type: "bad", pts: 1, feedback: "Без передачи знаний подрядчик не даст быстрой пользы; потеряете деньги и время." },
          { key: "Б", text: "Сделать сессию передачи знаний, пересмотреть скоуп и открыто сообщить риски.", type: "good", pts: 3, feedback: "Это зрелая кризисная реакция: знания, прозрачность и управляемые сценарии." },
          { key: "В", text: "Не говорить стейкхолдерам, решить внутри, чтобы не сеять панику.", type: "danger", pts: 0, feedback: "Сокрытие рисков разрушает доверие и ухудшает последствия, когда проблема всплывает." },
          { key: "Г", text: "Сразу попросить перенос дедлайна на 6 недель без альтернатив.", type: "ok", pts: 2, feedback: "Честно, но слабо: к руководству лучше приходить с вариантами, а не только с проблемой." }
        ]
      },
      {
        title: "Данные против интуиции (Неделя 10)",
        competency: "Data-driven решения",
        context: "После беты: отчёты используют 78% клиентов, pipeline — только 12%. CPO не хочет резать pipeline из-за уже вложенных 6 недель.",
        stakeholders: [
          { name: "CPO", text: "Pipeline — ключевая фича, просто надо обучить клиентов." },
          { name: "Метрики", text: "NPS 4.2/10, платят за pipeline 3 из 20." }
        ],
        question: "Как вы поступите с pipeline за 6 недель до релиза?",
        choices: [
          { key: "А", text: "Оставить pipeline и добавить onboarding/уведомления.", type: "danger", pts: 0, feedback: "Это sunk cost fallacy: игнорирование слабого adoption вредит фокусу." },
          { key: "Б", text: "Провести 5 интервью с неиспользующими pipeline и потом решить.", type: "good", pts: 3, feedback: "Правильная диагностика перед решением: UX-проблема или отсутствие ценности." },
          { key: "В", text: "Убрать pipeline из MVP и усилить отчёты, вернуть pipeline в v2.", type: "good", pts: 3, feedback: "Смелый data-driven фокус на том, что реально создаёт ценность сейчас." },
          { key: "Г", text: "Оставить pipeline, но сделать платным опциональным модулем.", type: "ok", pts: 2, feedback: "Интересно для монетизации, но pricing не исправляет слабый product-market fit." }
        ]
      },
      {
        title: "Критический баг перед запуском (Неделя 14)",
        competency: "Управление риском запуска",

        tips: roleMap[area] || ["Сформируйте персональный план практики по этой компетенции."]
      }));
    }

    function getScenarioForRole(role, index) {
      const base = scenarios[index];
      const roleData = roleOverrides[role]?.[index];
      if (!roleData) return base;
      return {
        ...base,
        context: roleData.context || base.context,
        question: roleData.question || base.question,
        stakeholders: roleData.stakeholders || base.stakeholders,
        choices: base.choices.map((choice, i) => ({
          ...choice,
          text: roleData.choiceTexts?.[i] || choice.text
        }))
      };
    }

    function getScenarioVisualMeta(competencyKey) {
      const key = (competencyKey || "").toLowerCase();
      if (key.includes("приоритизация")) {
        return { icon: "🧭", title: "Приоритизация", subtitle: "Согласование scope и компромиссов" };
      }
      if (key.includes("кризис")) {
        return { icon: "🚨", title: "Кризис", subtitle: "Прозрачная коммуникация под давлением" };
      }
      if (key.includes("data")) {
        return { icon: "📊", title: "Данные", subtitle: "Решение на основе метрик, а не интуиции" };
      }
      if (key.includes("запуска")) {
        return { icon: "🛡️", title: "Запуск", subtitle: "Риск-контроль и качество релиза" };
      }
      if (key.includes("рост")) {
        return { icon: "📈", title: "Рост", subtitle: "Удержание и масштабирование" };
      }
      return { icon: "🧩", title: "Кейс", subtitle: "Управленческая дилемма" };
    }

    function applyLevelToScenario(baseScenario, role, level, roundTitle) {
      const cfg = levelConfigs[level] || levelConfigs.middle;
      const levelCategory = cfg.categoryByCompetency[baseScenario.competency] || baseScenario.competency;

      const simplifyForJunior = (text) => {
        let t = text;
        const replacements = [
          [/scope|скоуп/gi, "объем задач"],
          [/baseline/gi, "базовый план"],
          [/critical path/gi, "ключевой план работ"],
          [/adoption/gi, "использование"],
          [/retention/gi, "удержание"],
          [/roadmap/gi, "план развития"],
          [/stakeholder/gi, "заинтересованная сторона"],
          [/go-live/gi, "запуск"],
          [/RACI/gi, "распределение ответственности"],
          [/RAID/gi, "реестр рисков и проблем"],
          [/stage-gate/gi, "этапный контроль"],
          [/portfolio/gi, "общий портфель задач"],
          [/outcome/gi, "результат"]
        ];
        replacements.forEach(([regex, repl]) => { t = t.replace(regex, repl); });
        t = t.replace(/\(.*?\)/g, "").replace(/\s{2,}/g, " ").trim();
        return t;
      };

      const roleLens = {
        PM: {
          junior: "Смотрите на ценность для клиента и понятный следующий шаг.",
          middle: "Балансируйте ценность, скорость и технические ограничения.",
          senior: "Защитите решение данными и влиянием на продуктовую стратегию.",
          lead: "Учтите системный эффект на портфель продукта и бизнес-результат."
        },
        PMO: {
          junior: "Смотрите на сроки, риски и понятный план для команды.",
          middle: "Учитывайте зависимости, реалистичность плана и управление рисками.",
          senior: "Формируйте управляемые сценарии для steering-решения.",
          lead: "Решение должно стабилизировать систему команд и governance контур."
        }
      };

      const advancedChoiceSuffix = {
        PM: {
          senior: {
            good: "С фокусом на продуктовый outcome и масштабируемость.",
            ok: "С учётом краткосрочного эффекта и возможного долга.",
            bad: "Риск: слабая связь с ценностью для пользователя.",
            danger: "Критичный риск для доверия к продуктовым решениям."
          },
          lead: {
            good: "Оцените влияние на портфель и стратегию компании.",
            ok: "Проверьте, не размывает ли компромисс фокус портфеля.",
            bad: "Риск: локальная оптимизация в ущерб системе.",
            danger: "Системный риск для бизнеса и доверия руководства."
          }
        },
        PMO: {
          senior: {
            good: "С фокусом на управляемость исполнения и рисков.",
            ok: "Оцените влияние на critical path и SLA команды.",
            bad: "Риск: слабая управляемость плана и зависимостей.",
            danger: "Критичный риск срыва программы и эскалаций."
          },
          lead: {
            good: "Проверьте влияние на program governance и exec-решения.",
            ok: "Убедитесь, что компромисс не ломает систему контроля.",
            bad: "Риск: локальная мера без системного эффекта.",
            danger: "Системный риск для программы и бизнес-обязательств."
          }
        }
      };

      const tunedChoices = baseScenario.choices.map((choice) => {
        if (level === "junior") {
          const roleNote = role === "PM"
            ? "С позиции PM: что даст понятную пользу клиенту."
            : "С позиции PMO: что даст понятный и безопасный план.";
          return {
            ...choice,
            text: `${simplifyForJunior(choice.text)} ${roleNote}`
          };
        }
        if (level === "senior" || level === "lead") {
          const suffix = advancedChoiceSuffix[role]?.[level]?.[choice.type] || "Оцените долгосрочный эффект и системные риски.";
          return {
            ...choice,
            text: `${choice.text} (${suffix})`
          };
        }
        return choice;
      });
      const juniorPreset = level === "junior" ? juniorSimplifiedByCompetency[baseScenario.competency] : null;
      return {
        ...baseScenario,
        competencyKey: baseScenario.competency,
        category: levelCategory,
        context: juniorPreset
          ? `${juniorPreset.context} ${roleLens[role]?.junior || ""}`
          : `${baseScenario.context} ${cfg.contextAddon} ${roleLens[role]?.[level] || ""}`,
        question: juniorPreset
          ? `${juniorPreset.question} (${role === "PM" ? "роль PM" : "роль PMO"})`
          : `${cfg.questionPrefix}${baseScenario.question}`,
        competency: `${baseScenario.competency} (${cfg.complexityTag})`,
        choices: tunedChoices,
        roundTitle
      };
    }

    function buildRoundsForRole(role, level) {
      const cfg = levelConfigs[level] || levelConfigs.middle;
      const coreRound = {
        title: `Раунд 1: Core Case Game (${cfg.label})`,
        focus: cfg.focusByRole[role] || cfg.focusByRole.PM,
        scenarios: scenarios.map((_, i) => applyLevelToScenario(getScenarioForRole(role, i), role, level, "Раунд 1"))
      };
      const baseDrills = (drillRounds[role] || []).slice(0, cfg.roundsToInclude - 1).map((round, rIdx) => ({
        ...round,
        title: `${round.title} (${cfg.label})`,
        focus: (round.focus || []).concat(cfg.focusByRole[role]?.slice(0, 1) || []),
        scenarios: round.scenarios.map((s) => applyLevelToScenario(s, role, level, `Раунд ${rIdx + 2}`))
      }));
      const rounds = [coreRound, ...baseDrills];
      if (level === "lead") {
        const leadRound = leadExtraRounds[role];
        if (leadRound) {
          rounds.push({
            ...leadRound,
            scenarios: leadRound.scenarios.map((s) => applyLevelToScenario(s, role, level, "Раунд 4"))
          });
        }
      }
      return rounds;
    }

    function initTrainingFlow() {
      state.roundsData = buildRoundsForRole(state.role, state.level);
      state.roundAnswers = state.roundsData.map(() => []);
      state.roundScores = state.roundsData.map(() => 0);
      state.roundIdx = 0;
      state.idx = 0;
      state.score = 0;
    }

    function getCurrentRound() {
      return state.roundsData[state.roundIdx];
    }

    function getAllAnswers() {
      return state.roundAnswers.flat().filter(Boolean);
    }

    function getMaxScore() {
      return state.roundsData.reduce((acc, round) => acc + (round.scenarios.length * 3), 0);
    }

    function renderThemeToggle() {
      const isLight = state.theme === "light";
      return `<button class="theme-btn" id="themeBtn" aria-label="Переключить тему">${isLight ? "Dark" : "Light"}</button>`;
    }

    function bindThemeToggle() {
      const btn = document.getElementById("themeBtn");
      if (!btn) return;
      btn.addEventListener("click", () => {
        state.theme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem("pmTheme", state.theme);
        document.body.setAttribute("data-theme", state.theme);
        render();
      });
    }

    function exportResults() {
      const allAnswers = getAllAnswers();
      const maxScore = getMaxScore();
      const payload = {
        generatedAt: new Date().toISOString(),
        role: state.role,
        level: state.level,
        rounds: state.roundsData.map((round, i) => ({
          title: round.title,
          focus: round.focus,
          score: state.roundScores[i],
          maxScore: round.scenarios.length * 3
        })),
        score: state.score,
        maxScore,
        profile: profileByScore(state.score, maxScore).title,
        answers: allAnswers.map((a, i) => ({
          scenarioIndex: i + 1,
          round: a.roundTitle,
          scenario: a.scenario,
          competency: a.competencyKey,
          competencyLabel: a.competencyLabel,
          choiceKey: a.choice.key,
          choiceType: a.choice.type,
          points: a.choice.pts,
          choiceText: a.choice.text,
          feedback: a.choice.feedback
        }))
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `pm-case-game-results-${Date.now()}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function shareResults() {
      const maxScore = getMaxScore();
      const profile = profileByScore(state.score, maxScore);
      const text = `PM Case Game: ${state.score}/${maxScore} (${profile.title}). Роль: ${state.role}, уровень: ${state.level}.`;
      if (navigator.share) {
        try {
          await navigator.share({ title: "PM Case Game", text });
          return;
        } catch (_) {}
      }
      if (navigator.clipboard?.writeText) {
        await navigator.clipboard.writeText(text);
        alert("Текст результата скопирован в буфер обмена.");
        return;
      }
      alert(text);
    }

    function buildCoachContext() {
      const maxScore = getMaxScore();
      const profile = profileByScore(state.score, maxScore).title;
      const allAnswers = getAllAnswers();
      const answers = allAnswers.map((a, i) => (
        `${i + 1}) ${a.roundTitle} / ${a.scenario}\nКомпетенция: ${a.competencyLabel}\nВыбор: ${a.choice.key}. ${a.choice.text}\nТип: ${typeLabel(a.choice.type)}\nОчки: ${a.choice.pts}\nФидбек: ${a.choice.feedback}`
      )).join("\n\n");
      return `Ты опытный product coach. Дай практичный, честный и структурированный разбор.
Формат ответа:
1) Что получилось хорошо (до 3 пунктов)
2) Критичные риски (до 3 пунктов)
3) Точные действия на 2 недели (3-5 шагов)
4) Один вопрос на рефлексию

Профиль участника: ${profile}
Роль: ${state.role}
Уровень: ${state.level}
Счёт: ${state.score}/${maxScore}

Результаты по сценариям:
${answers}`;
    }

    function loadCoachSettings() {
      coachEndpoint.value = localStorage.getItem("pmCoachEndpoint") || "https://api.openai.com/v1/chat/completions";
      coachModel.value = localStorage.getItem("pmCoachModel") || "gpt-4o-mini";
      coachApiKey.value = localStorage.getItem("pmCoachApiKey") || "";
      const provider = localStorage.getItem("pmCoachProvider") || "openai";
      setProviderUI(provider);
    }

    function saveCoachSettings() {
      localStorage.setItem("pmCoachEndpoint", coachEndpoint.value.trim());
      localStorage.setItem("pmCoachModel", coachModel.value.trim());
      localStorage.setItem("pmCoachApiKey", coachApiKey.value.trim());
      localStorage.setItem("pmCoachProvider", detectProviderFromEndpoint(coachEndpoint.value.trim()));
    }

    function detectProviderFromEndpoint(endpoint) {
      const ep = endpoint.toLowerCase();
      if (ep.includes("anthropic.com")) return "anthropic";
      if (ep.includes("openrouter.ai")) return "openrouter";
      if (ep.includes("deepseek.com")) return "deepseek";
      return "openai";
    }

    function setProviderUI(provider) {
      providerBtns.forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.provider === provider);
      });
      const placeholder = providerDefaults[provider]?.keyPlaceholder || "API key";
      coachApiKey.placeholder = placeholder;
    }

    function applyProviderDefaults(provider) {
      const cfg = providerDefaults[provider];
      if (!cfg) return;
      coachEndpoint.value = cfg.endpoint;
      coachModel.value = cfg.model;
      setProviderUI(provider);
      localStorage.setItem("pmCoachProvider", provider);
    }

    function renderCoachMessages() {
      coachLog.innerHTML = state.coachMessages.map((m) => (
        `<div class="msg ${m.role}"><b>${m.role === "user" ? "Вы" : m.role === "assistant" ? "AI-тренер" : "Система"}:</b>\n${m.content}</div>`
      )).join("");
      coachLog.scrollTop = coachLog.scrollHeight;
    }

    function openCoachModal() {
      loadCoachSettings();
      if (!state.coachMessages.length) {
        const totalAnswers = getAllAnswers().length;
        state.coachMessages = [{
          role: "system",
          content: `Задайте вопрос по своему прохождению. Я учту ваши ответы в ${totalAnswers} сценариях и дам персональный разбор.`
        }];
      }
      renderCoachMessages();
      coachModal.classList.add("open");
      coachInput.focus();
    }

    function closeCoachModal() {
      coachModal.classList.remove("open");
    }

    async function sendCoachMessage() {
      const userText = coachInput.value.trim();
      if (!userText) return;
      saveCoachSettings();
      const endpoint = coachEndpoint.value.trim();
      const model = coachModel.value.trim();
      const apiKey = coachApiKey.value.trim();
      if (!endpoint || !model || !apiKey) {
        state.coachMessages.push({ role: "system", content: "Заполните endpoint, model и API key, затем повторите отправку." });
        renderCoachMessages();
        return;
      }

      state.coachMessages.push({ role: "user", content: userText });
      coachInput.value = "";
      renderCoachMessages();
      coachSendBtn.disabled = true;
      const context = buildCoachContext();

      try {
        const provider = detectProviderFromEndpoint(endpoint);
        const baseMessages = [
          { role: "system", content: context },
          ...state.coachMessages.filter((m) => m.role === "user" || m.role === "assistant").map((m) => ({
            role: m.role,
            content: m.content
          }))
        ];
        let res;
        if (provider === "anthropic") {
          const anthropicMessages = [];
          for (const m of baseMessages) {
            if (m.role === "system") continue;
            anthropicMessages.push(m);
          }
          res = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": apiKey,
              "anthropic-version": "2023-06-01"
            },
            body: JSON.stringify({
              model,
              system: context,
              max_tokens: 900,
              temperature: 0.5,
              messages: anthropicMessages
            })
          });
        } else {
          res = await fetch(endpoint, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${apiKey}`
            },
            body: JSON.stringify({
              model,
              messages: baseMessages,
              temperature: 0.5
            })
          });
        }

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`HTTP ${res.status}: ${errText.slice(0, 200)}`);
        }

        const data = await res.json();
        let text = data?.choices?.[0]?.message?.content?.trim();
        if (!text && Array.isArray(data?.content)) {
          text = data.content.map((c) => c?.text || "").join("").trim();
        }
        if (!text) throw new Error("Пустой ответ модели.");
        state.coachMessages.push({ role: "assistant", content: text });
      } catch (err) {
        state.coachMessages.push({
          role: "system",
          content: `Ошибка запроса к LLM: ${err.message}. Проверьте API key, endpoint, model и CORS-политику провайдера.`
        });
      } finally {
        coachSendBtn.disabled = false;
        renderCoachMessages();
      }
    }

      if (state.step === "roundSummary") renderRoundSummary();

      state.lastRenderedStep = state.step;

          <button class="role-btn ${state.level === "lead" ? "active" : ""}" data-level="lead"><b>Lead</b><br><span class="muted">${levelConfigs.lead.description}</span></button>
        </div>
        ${selectedLevelCfg ? `<p class="muted"><b>Выбранный трек:</b> ${selectedLevelCfg.label} · ${selectedLevelCfg.complexityTag}</p>` : `<p class="muted">Выберите роль и уровень, чтобы сгенерировать персональную дорожку тренировки.</p>`}
        <button class="btn" id="startBtn" ${(state.role && state.level) ? "" : "disabled"}>Начать</button>
      `;
      document.querySelectorAll("[data-role]").forEach((btn) => {
        btn.addEventListener("click", () => { state.role = btn.dataset.role; render(); });
      });
      document.querySelectorAll("[data-level]").forEach((btn) => {
        btn.addEventListener("click", () => { state.level = btn.dataset.level; render(); });
      });
      document.getElementById("startBtn").addEventListener("click", () => {
        initTrainingFlow();
        state.step = "briefing";
        render();
      });
      bindThemeToggle();
    }

    function renderBriefing() {
      const round = getCurrentRound();
      const sc = round.scenarios[state.idx];
      const visual = getScenarioVisualMeta(sc.competencyKey || sc.competency);
      app.innerHTML = `
        ${topBar()}
        <span class="badge">Этап ${state.idx + 1} из ${round.scenarios.length}</span>
        <h2>${sc.title}</h2>
        <div class="scenario-meta">
          <div class="scenario-icon">${visual.icon}</div>
          <div>
            <b>${visual.title}</b>
            <span class="muted">${visual.subtitle}</span>
          </div>
        </div>
        <p>${sc.context}</p>
        <p class="muted"><b>Категория:</b> ${sc.category || sc.competency}</p>
        <p class="muted"><b>Тренируемый скилл:</b> ${sc.competency}</p>
        <div class="stakeholders">
          ${sc.stakeholders.map((s) => `<div class="bubble">${getStakeholderAvatar(s.name)}<div><b>${s.name}:</b> ${s.text}</div></div>`).join("")}
        </div>
        <button class="btn" id="toDecision">К решению</button>
      `;
      document.getElementById("toDecision").addEventListener("click", () => { state.step = "decision"; render(); });
      bindThemeToggle();
    }

    function renderDecision() {
      const round = getCurrentRound();
      const sc = round.scenarios[state.idx];
      const visual = getScenarioVisualMeta(sc.competencyKey || sc.competency);
      const alreadyChosen = state.roundAnswers[state.roundIdx][state.idx];
      app.innerHTML = `
        ${topBar()}
        <span class="badge">Роль: ${state.role} · Уровень: ${state.level}</span>
        <h2>${sc.title}</h2>
        <div class="scenario-meta">
          <div class="scenario-icon">${visual.icon}</div>
          <div>
            <b>${visual.title}</b>
            <span class="muted">${visual.subtitle}</span>
          </div>
        </div>
        <p class="muted"><b>Категория:</b> ${sc.category || sc.competency}</p>
        <p><b>Вопрос:</b> ${sc.question}</p>
        <div class="choice-list">
          ${sc.choices.map((c, i) => `
            <button class="choice ${alreadyChosen ? "locked" : ""}" data-choice="${i}" ${alreadyChosen ? "disabled" : ""}>
              <b>${c.key}.</b> ${c.text}
            </button>
          `).join("")}
        </div>
        <div id="feedbackBlock"></div>
      `;

      if (alreadyChosen) {
        showFeedback(alreadyChosen.choice, true);
      } else {
        document.querySelectorAll("[data-choice]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const choice = sc.choices[Number(btn.dataset.choice)];
            state.score += choice.pts;
            state.roundScores[state.roundIdx] += choice.pts;
            state.roundAnswers[state.roundIdx][state.idx] = {
              roundTitle: round.title,
              scenario: sc.title,
              competencyKey: sc.competencyKey || sc.competency,
              competencyLabel: sc.competency,
              choice
            };
            showFeedback(choice, false);
            document.querySelectorAll(".choice").forEach((b) => b.disabled = true);
          });
        });
      }
      bindThemeToggle();
    }

    function showFeedback(choice, locked) {
      const wrap = document.getElementById("feedbackBlock");
      const round = getCurrentRound();
      const lastInRound = state.idx === round.scenarios.length - 1;
      wrap.innerHTML = `
        <div class="feedback ${choice.type}">
          <p><b>${typeLabel(choice.type)}</b> · +${choice.pts} очк.</p>
          <p class="muted">${choice.feedback}</p>
        </div>
        <button class="btn" id="nextBtn" style="margin-top:10px;">${lastInRound ? (state.roundIdx === state.roundsData.length - 1 ? "К итогам" : "К промежуточным итогам") : "Далее"}</button>
      `;
      document.getElementById("nextBtn").addEventListener("click", () => {
        if (lastInRound) {
          if (state.roundIdx === state.roundsData.length - 1) state.step = "results";
          else state.step = "roundSummary";
        } else {
          state.idx += 1;
          state.step = "briefing";
        }
        render();
      });
    }

    function renderRoundSummary() {
      const round = getCurrentRound();
      const roundScore = state.roundScores[state.roundIdx];
      const roundMax = round.scenarios.length * 3;
      const percent = Math.round((roundScore / roundMax) * 100);
      const weakSkills = state.roundAnswers[state.roundIdx]
        .filter(Boolean)
        .filter((a) => a.choice.pts <= 1)
        .map((a) => a.competencyKey);
      const uniqueWeakSkills = [...new Set(weakSkills)];
      app.innerHTML = `
        <span class="badge">Промежуточные результаты</span>
        <h2>${round.title}</h2>
        <p class="muted"><b>Трек:</b> ${state.role} · ${state.level}</p>
        <div class="ring-wrap">
          <div class="ring" style="--p:${percent};"><div>${roundScore}</div></div>
          <div>
            <p><b>${roundScore} / ${roundMax} очков</b></p>
            <p class="muted">Фокус раунда: ${round.focus.join(", ")}</p>
          </div>
        </div>
        <div class="growth">
          <h3>Фокус тренировки в следующем раунде</h3>
          ${uniqueWeakSkills.length ? uniqueWeakSkills.map((skill) => `<p class="growth-item"><b>${skill}:</b> <span class="muted">${growthHints[skill]}</span></p>`).join("") : `<p class="muted">Сильный раунд. Следующий блок поднимет сложность и добавит стресс-тест навыков.</p>`}
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
          <button class="btn" id="nextRoundBtn">Начать следующий раунд</button>
        </div>
      `;
      document.getElementById("nextRoundBtn").addEventListener("click", () => {
        state.roundIdx += 1;
        state.idx = 0;
        state.step = "briefing";
        render();
      });
      bindThemeToggle();
    }

    function renderResults() {
      const allAnswers = getAllAnswers();
      const maxScore = getMaxScore();
      const profile = profileByScore(state.score, maxScore);
      const percent = Math.round((state.score / maxScore) * 100);
      const growthAreas = allAnswers
        .map((a) => ({ pts: a.choice.pts, competency: a.competencyKey }))
        .filter((item) => item.pts <= 1);
      const uniqueGrowthAreas = [...new Set(growthAreas.map((g) => g.competency))];
      const skillPlan = buildSkillGrowthPlan(uniqueGrowthAreas);
      app.innerHTML = `
        <span class="badge">Результаты</span>
        <h2>${profile.title}</h2>
        <p class="muted"><b>Трек:</b> ${state.role} · ${state.level}</p>
        <div class="ring-wrap">
          <div class="ring" style="--p:${percent};"><div>${state.score}</div></div>
          <div>
            <p><b>${state.score} / ${maxScore} очков</b></p>
            <p class="muted">${profile.note}</p>
          </div>
        </div>
        <div class="log">
          ${state.roundsData.map((round, i) => `
            <div class="log-item">
              <b>${round.title}</b>
              <span class="pill good">${state.roundScores[i]} / ${round.scenarios.length * 3} очк.</span>
              <p class="muted">Фокус: ${round.focus.join(", ")}</p>
            </div>
          `).join("")}
        </div>
        <div class="log">
          ${allAnswers.map((a, i) => `
            <div class="log-item">
              <b>${i + 1}. ${a.roundTitle} / ${a.scenario}</b>
              <span class="muted"> · ${a.competencyLabel}</span>
              <span class="pill ${a.choice.type}">${typeLabel(a.choice.type)} · ${a.choice.pts} очк.</span>
              <p class="muted" style="margin-top:8px;"><b>Выбор:</b> ${a.choice.key}. ${a.choice.text}</p>
              <p class="muted">${a.choice.feedback}</p>
            </div>
          `).join("")}
        </div>
        <div class="growth">
          <h3>Зоны роста</h3>
          ${uniqueGrowthAreas.length ? uniqueGrowthAreas.map((area) => `
            <p class="growth-item"><b>${area}:</b> <span class="muted">${growthHints[area]}</span></p>
          `).join("") : `<p class="muted">Критичных зон роста не выявлено. Можно усложнять кейсы и добавлять командный режим.</p>`}
        </div>
        <div class="skills-box">
          <h3>Рекомендации по скиллам</h3>
          ${skillPlan.map((item) => `
            <div class="skills-item">
              <p><b>${item.title}</b></p>
              <p class="muted">- ${item.tips.join("<br>- ")}</p>
            </div>
          `).join("")}
        </div>
        <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:14px;">
          <button class="btn" id="retryBtn">Ещё раз</button>
          <button class="btn" id="coachBtn" style="background:#25263a;border:1px solid #3f4159;">Разобрать с тренером</button>
          <button class="btn" id="exportBtn" style="background:#1f2030;border:1px solid #3d3f58;">Экспорт JSON</button>
          <button class="btn" id="shareBtn" style="background:#1f2030;border:1px solid #3d3f58;">Поделиться результатом</button>
        </div>
      `;
      document.getElementById("retryBtn").addEventListener("click", () => {
        state.step = "welcome";
        state.role = null;
        state.level = null;
        state.roundIdx = 0;
        state.idx = 0;
        state.score = 0;
        state.roundsData = [];
        state.roundAnswers = [];
        state.roundScores = [];
        state.coachMessages = [];
        render();
      });
      document.getElementById("coachBtn").addEventListener("click", () => {
        openCoachModal();
      });
      document.getElementById("exportBtn").addEventListener("click", exportResults);
      document.getElementById("shareBtn").addEventListener("click", () => {
        shareResults().catch(() => alert("Не удалось поделиться автоматически. Попробуйте еще раз."));
      });
      bindThemeToggle();
    }

    coachSendBtn.addEventListener("click", () => { sendCoachMessage(); });
    coachInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendCoachMessage();
    });
    coachCloseBtn.addEventListener("click", closeCoachModal);
    providerBtns.forEach((btn) => {
      btn.addEventListener("click", () => {
        applyProviderDefaults(btn.dataset.provider);
      });
    });
    coachModal.addEventListener("click", (e) => {
      if (e.target === coachModal) closeCoachModal();
    });

    render();
  </script>
</body>
</html>
